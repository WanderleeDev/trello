<div class="px-6">
  <div class="max-w-7xl mx-auto flex flex-col gap-6">
    <app-board-list-container title="Starred boards">
      <span class="material-symbols-outlined" style="font-size: 22px" ngProjectAs="icon-title"
        >star</span
      >
      <ng-container ngProjectAs="list-content">
        @for (item of starredBoards(); track item.id) {
          <a [routerLink]="['/board', item.id, item.name]">
            <app-board-card [data]="item">
              <app-btn-star-favorite (click)="onStarToggled($event)" ngProjectAs="extra-2" />
            </app-board-card>
          </a>
        }
      </ng-container>
    </app-board-list-container>

    <app-board-list-container title="Recent boards">
      <span class="material-symbols-outlined" style="font-size: 22px" ngProjectAs="icon-title"
        >schedule</span
      >
      <ng-container ngProjectAs="list-content">
        @for (item of recentBoards(); track item.id) {
          <a [routerLink]="['/board', item.id, item.name]">
            <app-board-card [data]="item">
              <app-btn-star-favorite (click)="onStarToggled($event)" ngProjectAs="extra-2" />
            </app-board-card>
          </a>
        }
      </ng-container>
    </app-board-list-container>

    <app-board-list-container title="YOUR WORKSPACES">
      <app-letter-gradient-icon [$letter]="'t'" ngProjectAs="icon-title" />
      <ng-container ngProjectAs="list-content">
        @for (item of workspaceBoards(); track item.id) {
          <a [routerLink]="['/board', item.id, item.name]" [state]="{ idBoard: item.description }">
            <app-board-card [data]="item" />
          </a>
        }
      </ng-container>
    </app-board-list-container>
  </div>
</div>
