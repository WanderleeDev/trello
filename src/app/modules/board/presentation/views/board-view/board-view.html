<main
  class="board-body bg-transparent min-h-dvh grid grid-rows-[auto_1fr] relative"
  style="background-color: var(--bg-main)"
>
  <app-nav />

  <app-board-view-area>
    <header class="flex gap-2 items-center p-4 backdrop-blur-md bg-white/10 border-b border-white/20 sticky top-0 z-10" ngProjectAs="header">
      <h2 class="text-lg font-semibold text-white drop-shadow-sm">{{nameBoard()}}</h2>
      <app-btn-base>
        <app-mat-icon name="star" />
      </app-btn-base>
    </header>
  </app-board-view-area>
</main>
