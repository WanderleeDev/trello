<details class="group/accordion" open>
  <summary class="flex items-center gap-2 pb-2 cursor-pointer list-none [&::-webkit-details-marker]:hidden [&::marker]:hidden">
    <ng-content select="header" />
    <span
      class="material-symbols-outlined text-base ml-auto transition-transform duration-200 group-open/accordion:rotate-180"
      translate="no"
      aria-hidden="true"
    >expand_more</span>
  </summary>
  <div class="flex flex-col gap-2">
    <ng-content select="body" />
    <ng-content select="footer" />
  </div>
</details>
