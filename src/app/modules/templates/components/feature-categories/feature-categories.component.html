<article class="w-full overflow-x-hidden">
  <h2 class="text-xl font-semibold mb-4 capitalize">features categories</h2>

  <div class="grid grid-cols-3 gap-4 capitalize text-center md:flex md:flex-row">
    @for (category of featureCategories | keyvalue; track $index) {
      <a [routerLink]="['/dashboard/templates/features', category.key]">
        <figure class="w-25">
          <img
            class="rounded-md aspect-square"
            aria-hidden="true"
            [ngSrc]="featureCategories[category.key]"
            alt="category.key"
            width="100"
            height="100"
          />
          <figcaption class="mt-1">
            {{ category.key | searchAndReplace: '-' : ' ' }}
          </figcaption>
        </figure>
      </a>
    }
  </div>
</article>
