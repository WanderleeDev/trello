<article class="min-h-[calc(100dvh-4rem)] flex flex-col items-center justify-center px-4 py-12 bg-background">
  <header class="text-center mb-10">
    <span class="inline-block text-5xl mb-4">✨</span>
    <h2 class="text-4xl md:text-5xl font-bold mb-3 text-foreground tracking-tight">Coming Soon: More Templates!</h2>
    <p class="text-secondary text-lg max-w-md mx-auto leading-relaxed">
      We're working on new templates to enhance your Trello experience
    </p>
  </header>

  <div class="w-full max-w-5xl">
    <ul class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 list-none p-0 m-0">
      @for (feature of features; track $index) {
        <li class="group relative p-6 bg-card rounded-2xl border border-border-inverse/10 shadow-card transition-all duration-300 hover:-translate-y-1.5 hover:shadow-lg hover:border-active-fg/30">
          <span class="flex items-center justify-center w-12 h-12 rounded-xl bg-btn-hovered text-2xl mb-4 group-hover:scale-110 transition-transform duration-300">{{ feature.icon }}</span>
          <h3 class="text-base font-semibold mb-2 text-foreground">{{ feature.title }}</h3>
          <p class="text-sm leading-relaxed text-secondary m-0">{{ feature.description }}</p>
        </li>
      }
    </ul>

    <footer class="flex justify-center mt-10">
      <a class="text-active-fg text-sm hover:underline" routerLink="/dashboard">Back to dashboard</a>
    </footer>
  </div>
</article>
