<article
  class="bg-card rounded-xl shadow-card p-3 flex flex-col gap-2 cursor-pointer hover:bg-btn-hovered transition-colors duration-200 group"
  cdkDrag
>
  @if (card().description) {
    <div class="h-1 w-12 rounded-full bg-active-fg"></div>
  }

  <h4 class="text-sm font-semibold leading-snug text-foreground">
    {{ card().title }}
  </h4>

  @if (card().description) {
    <p class="text-xs text-foreground/60 leading-relaxed line-clamp-2">
      {{ card().description }}
    </p>
  }

  <div class="flex items-center gap-3 mt-1 text-foreground/40">
    <span class="material-symbols-outlined text-sm" translate="no" aria-hidden="true">description</span>
    <span class="material-symbols-outlined text-sm" translate="no" aria-hidden="true">comment</span>
  </div>
</article>
