<article
  class="bg-card rounded-lg shadow flex flex-col cursor-pointer hover:bg-btn-hovered transition-colors duration-200 group overflow-hidden"
>
  @if (card().image) {
    <img class="w-full h-24 object-cover" [src]="card().image" alt="" />
  }

  <div class="p-3 flex flex-col gap-1.5">
    @if (card().description) {
      <div class="h-1 w-10 rounded-full bg-active-fg"></div>
    }

    <h4 class="text-sm font-semibold leading-snug text-foreground">{{ card().title }}</h4>

    @if (card().description) {
      <p class="text-xs text-foreground/60 leading-relaxed line-clamp-2">{{ card().description }}</p>
    }

    <div class="flex items-center gap-2 mt-1 text-foreground/40" translate="no" aria-hidden="true">
      <span class="material-symbols-outlined" style="font-size: 1.2rem">sort</span>
      <span class="material-symbols-outlined rotate-30" style="font-size: 1.2rem">attach_file</span>
    </div>
  </div>
</article>
