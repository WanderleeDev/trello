<div
  cdkDropList
  class="flex gap-6 h-full overflow-x-auto p-4 bg-[url('https://trello-backgrounds.s3.amazonaws.com/SharedBackground/480x322/47f09f0e3910259568294477d0bdedac/photo-1576502200916-3808e07386a5.jpg')] bg-no-repeat bg-cover"
  (cdkDropListDropped)="drop($event)"
  [cdkDropListSortPredicate]="sortPredicate"
>
  @for (number of numbers(); track number) {
    <div
      class="flex flex-col min-w-65 h-fit max-w-xs bg-board-column rounded-xl shadow p-3 not-motion-reduce:starting:opacity-0 not-motion-reduce:starting:translate-y-5 not-motion-reduce:transition-all not-motion-reduce:duration-400 not-motion-reduce:ease-out"
      [cdkDragData]="number"
      cdkDrag
    >
      <div class="font-semibold mb-2">Column {{ number }}</div>
      <app-add-list-button class="p-0 min-w-full" (emitter)="addNewColumn($event)" />
    </div>
  }

  <app-add-list-button (emitter)="addNewColumn($event)" />
</div>
