<div class="flex flex-col h-full w-full overflow-x-scroll" [style.color]="'var(--text-main-clr)'">
  <app-board-header [boardName]="boardName()" />

  <div class="flex gap-4 h-full">
    <div
      class="flex gap-4 p-4 h-full items-start"
      cdkDropList
      [cdkDropListData]="lists()"
      (cdkDropListDropped)="onListDropped($event)"
    >
      <ng-content />

      <ng-content select="add-list-btn" />
    </div>
  </div>
</div>
