<section
  class="flex flex-col min-w-65 h-fit max-w-xs bg-board-column rounded-xl shadow p-3 not-motion-reduce:starting:opacity-0 not-motion-reduce:starting:translate-y-5 not-motion-reduce:transition-all not-motion-reduce:duration-400 not-motion-reduce:ease-out"
>
  <header class="font-semibold mb-2 flex justify-between">
    <h3 class="grow bg-red-200">
      <button class="block w-full text-left" (click)="editableToggle()">
        <span class="capitalize" [attr.contenteditable]="isEditable()"> {{title()}} </span>
      </button>
    </h3>
    {{data().length}}
  </header>

  @for (card of data(); track card.id) {
    <article class="bg-card rounded-xl shadow-card p-3 flex flex-col gap-1.5 cursor-pointer hover:bg-btn-hovered transition-colors duration-200 group">
      @if (card.description) {
        <div class="h-1 w-10 rounded-full bg-active-fg"></div>
      }

      <h4 class="text-sm font-semibold leading-snug text-foreground">{{ card.title }}</h4>

      @if (card.description) {
        <p class="text-xs text-foreground/60 leading-relaxed line-clamp-2">{{ card.description }}</p>
      }

      <div class="flex items-center gap-2 mt-1 text-foreground/40" translate="no" aria-hidden="true">
        <span class="material-symbols-outlined text-sm">description</span>
        <span class="material-symbols-outlined text-sm">comment</span>
        <span class="material-symbols-outlined text-sm">attachment</span>
      </div>
    </article>
  }
  <app-add-list-button class="p-0 min-w-full shadow-none" (emitter)="addCard($event)" />
</section>
