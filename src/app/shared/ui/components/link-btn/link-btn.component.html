<a
  [routerLink]="href()"
  class="group flex items-center gap-[0.7rem] cursor-pointer min-h-6 mt-1 px-[0.4rem] py-[0.6rem] rounded-lg hover:bg-btn-hovered focus-visible:bg-btn-hovered active:bg-btn-pressed"
  routerLinkActive="bg-active text-active-fg"
  [routerLinkActiveOptions]="{ exact: true }"
  [class.pl-10]="design() === 'ident'"
>
  <ng-content select="left" />
  <ng-content />
  @if (design() === 'ident') {
    <span
      class="material-symbols-outlined text-base ml-auto opacity-0 -translate-x-2 transition-all duration-200 group-hover:opacity-100 group-hover:translate-x-0"
      translate="no"
      aria-hidden="true"
    >chevron_right</span>
  }
  <ng-content select="right" />
</a>
