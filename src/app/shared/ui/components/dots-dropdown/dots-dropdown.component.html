<button
  ngMenuTrigger
  #origin="cdkOverlayOrigin"
  #trigger="ngMenuTrigger"
  [menu]="formatMenu()"
  cdkOverlayOrigin
  [class.bg-btn-hovered]="trigger.expanded()"
  class="flex items-center gap-1 px-2.5 py-1.5 rounded text-sm font-semibold bg-background text-foreground hover:bg-btn-hovered focus-visible:outline-2 focus-visible:outline-active-fg capitalize"
>
  <span class="material-symbols-outlined" style="font-size: 20px">apps</span>
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOpen]="trigger.expanded()"
  [cdkConnectedOverlayOrigin]="origin"
  [cdkConnectedOverlayPositions]="[
    { originX: 'start', originY: 'bottom', overlayX: 'start', overlayY: 'top', offsetY: 4 },
  ]"
>
  <div
    ngMenu
    #formatMenu="ngMenu"
    class="min-w-60 p-1 rounded-lg bg-modal shadow-card not-motion-reduce:starting:opacity-0 not-motion-reduce:transition-opacity not-motion-reduce:duration-200"
  >
    <ng-template ngMenuContent>
      <span class="px-2 py-1 text-xs font-semibold text-foreground/60">Your apps</span>

      <div ngMenuItem value="atlassian" class="flex items-center gap-2 p-2 rounded cursor-pointer text-sm hover:bg-btn-hovered focus-visible:outline-2 focus-visible:outline-active-fg">
        <span class="bg-badge-new p-0.5 rounded">
          <app-atlasian-icon [size]="24" />
        </span>
        <span class="flex-1">Atlassian</span>
      </div>

      <div ngMenuItem value="trello" class="flex items-center gap-2 p-2 rounded cursor-pointer text-sm hover:bg-btn-hovered focus-visible:outline-2 focus-visible:outline-active-fg">
        <span class="bg-badge-new p-0.5 rounded">
          <app-trello-clr-icon [size]="24" />
        </span>
        <span class="flex-1">Trello</span>
      </div>
    </ng-template>
  </div>
</ng-template>
