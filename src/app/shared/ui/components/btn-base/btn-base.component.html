<button
  class="btn"
  [class.primary]="variant() === 'primary'"
  [class.mixed]="variant() === 'mixed'"
  [class.active]="activeStyle()"
  [class.rounded]="rounded()"
  [type]="btnType()"
  [attr.aria-label]="ariaLabel()"
>
  <ng-content select="left" />
  <ng-content />
  <ng-content select="right" />
</button>
