<button
  class="grid place-content-center p-0.5 rounded-full transition-transform duration-200 ease-in-out hover:scale-90 active:scale-110"
  (click)="theme.toggle()"
  type="button"
  title="change theme"
  aria-label="change theme"
>
  @if (theme.isHydrated()) {
    @if (theme.isDark()) {
      <app-moon-icon [size]="size" />
    } @else {
      <app-sun-icon [size]="size" />
    }
  } @else {
    <span class="w-7 h-7 rounded-full bg-foreground/10 animate-pulse"></span>
  }
</button>
