<app-link-btn class="card" [href]="path()">
  @if (image()) {
    <img class="card-image" [ngSrc]="image()!" alt="workspace cover" width="40" height="32" />
  } @else {
    <app-letter-gradient-icon [$letter]="name()" />
  }

  <span class="card-text">{{ name() }} </span>

  @if (badgeText()) {
    <app-badge class="card-badge" [content]="badgeText()!" />
  }
  <div class="card-extra">
    <ng-content />
  </div>
</app-link-btn>
