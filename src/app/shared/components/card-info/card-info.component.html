<figure class="flex flex-col items-center text-center max-w-100 mx-auto rounded-[0.3rem] shadow-card">
  <div class="relative w-full h-[6.75rem] px-6 bg-card-cover">
    <img [ngSrc]="image()" [alt]="title()" fill />
  </div>
  <div class="p-4 flex flex-col gap-2">
    <figcaption class="text-lg font-semibold">{{ title() }}</figcaption>
    <p class="text-sm leading-relaxed text-center">{{ description() }}</p>
  </div>
</figure>
