<!doctype html>
<html lang="en">
  <head>
    <!-- ngx-theme-stack anti-flash -->
    <script>
      (function () {
        try {
          var k = 'ngx-theme-stack',
            d = 'system',
            m = 'class',
            v = ['system', 'light', 'dark'],
            t = localStorage.getItem(k) || d,
            e = document.documentElement;
          if (!/^[a-zA-Z][a-zA-Z0-9_-]*$/.test(t) || v.indexOf(t) === -1) t = d;
          if (t === 'system')
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (m === 'class' || m === 'both') e.classList.add(t);
          if (m === 'attribute' || m === 'both') e.setAttribute('data-theme', t);
          if (t === 'dark' || t === 'light') e.style.setProperty('color-scheme', t);
        } catch (x) {}
      })();
    </script>
    <meta charset="utf-8" />
    <title>TrelloClone</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://trello-backgrounds.s3.amazonaws.com" />
  </head>
  <body class="text-gray-500">
    <app-root></app-root>
    <!-- ngx-theme-stack critters-trick -->
    <div
      id="ngx-theme-stack-critters-trick"
      hidden
      aria-hidden="true"
      style="display: none; overflow: hidden; clip-path: inset(50%); position: absolute"
    >
      <div class="light"></div>
      <div class="dark"></div>
    </div>
    <!-- /ngx-theme-stack critters-trick -->
  </body>
</html>
